    <g stroke="#a9743f" stroke-width="0.5" opacity="0.6">
      <path d="M23 35 L41.6 35"/>
      <path d="M23.4 40 L41 40"/>
      <path d="M23.8 45 L40.5 45"/>
    </g>
    <!-- pearls: open circles, engraved -->
    <g stroke-width="0.9">
      <circle cx="27" cy="50.5" r="2.6"/>
      <circle cx="33.5" cy="52" r="2.6"/>
      <circle cx="39" cy="50" r="2.4"/>
      <circle cx="30" cy="54.8" r="2.2"/>
      <circle cx="36.6" cy="55.2" r="2.2"/>
    </g>
  </g>
</svg>
