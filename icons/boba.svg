<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g fill="none" stroke="#c8925a" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
    <!-- straw: two parallel lines, angle-cut -->
    <path d="M40.6 5 L36.2 24"/>
    <path d="M43.4 6 L39 24.5"/>
    <path d="M40.6 5 L43.4 6"/>
    <!-- dome lid -->
    <path d="M20 22.5 Q20 15 32 15 Q44 15 44 22.5"/>
    <path d="M18.5 22.5 L45.5 22.5" stroke-width="1.3"/>
    <!-- cup: tapered outline, rounded base -->
    <path d="M20.5 22.5 L44 22.5 L42 53 Q41.7 57.5 36.8 57.5 L27.2 57.5 Q22.3 57.5 22 53 Z"/>
    <!-- tea line -->
    <path d="M22 30 L42.4 30" stroke="#a9743f" stroke-width="0.8"/>
